name: Run extractor

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Paste one or more URLs, separated by spaces or new lines"
        required: true
        type: string
  issues:
    types: [opened, edited]

permissions:
  contents: read
  issues: write

jobs:
  extract:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      contains(github.event.issue.title, '[extract]')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare URLs from manual input
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          mkdir -p results
          cat > urls.txt <<'URLS'
          ${{ inputs.urls }}
          URLS
          echo "Manual input saved to urls.txt"

      - name: Prepare URLs from issue
        if: github.event_name == 'issues'
        run: |
          mkdir -p results
          python tools/issue_to_urls.py "$GITHUB_EVENT_PATH" urls.txt

      - name: Run extractor
        run: python stream_extractor_cli.py --urls-file urls.txt --output-dir results

      - name: Upload results artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-extractor-results
          path: results/
          retention-days: 7

      - name: Comment result on issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment "${{ github.event.issue.number }}" --body-file results/results.md
